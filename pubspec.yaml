name: shopsync
description: "ShopSync - Efficient Shop Management."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  extension_google_sign_in_as_googleapis_auth: ^2.0.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  font_awesome_flutter: ^11.0.0
  google_fonts: ^8.1.0
  google_sign_in: ^6.2.2
  googleapis: ^16.0.0
  intl: ^0.20.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.2
  http: ^1.6.0
  fl_chart: ^1.2.0
  image_picker: ^1.2.2
  share_plus: ^13.1.0
  pdf: ^3.12.0
  file_picker: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21
